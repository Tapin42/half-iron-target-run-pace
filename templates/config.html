{% extends "base.html" %}
{% block content %}
<section class="panel config-dashboard-panel">
  <div class="panel-heading">
    <h2>Configure Athlete Target</h2>
    <a class="button-link button-link-secondary" href="{{ url_for('home') }}">Back to Athlete List</a>
  </div>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form id="config-form" class="config-dashboard-form" method="post" action="{{ url_for('save_config') }}">
    <label for="race_slug">Race</label>
    <select id="race_slug" name="race_slug">
      {% for race in race_options %}
        <option value="{{ race.slug }}" {% if race.slug == default_race_slug %}selected{% endif %}>{{ race.display_name }}</option>
      {% endfor %}
    </select>

    <label for="search_term">Search Athlete (name or bib)</label>
    <div class="row config-search-row">
      <input id="search_term" type="text" placeholder="e.g. Jane or 1432">
      <button id="search-btn" class="button-link config-search-button" type="button">Search RTRT</button>
    </div>

    <div id="search-feedback" class="meta config-feedback" role="status" aria-live="polite"></div>
    <ul id="search-results" class="search-results-list"></ul>

    <input id="entry_id" type="hidden" name="entry_id">
    <input id="profile_id" type="hidden" name="profile_id">
    <input id="name" type="hidden" name="name">
    <input id="bib" type="hidden" name="bib">
    <input id="division" type="hidden" name="division">

    <div class="selected-athlete-card">
      <p class="muted">Selected athlete</p>
      <p id="selected-athlete">None</p>
    </div>

    <label for="target_finish_time">Target Finish Time (HH:MM:SS)</label>
    <input id="target_finish_time" name="target_finish_time" placeholder="05:00:00" required>

    <button class="button-link config-save-button" type="submit">Save Athlete Target</button>
  </form>
</section>

<script src="{{ url_for('static', filename='athletes.js') }}"></script>
<script>
const searchBtn = document.getElementById("search-btn");
const searchTermInput = document.getElementById("search_term");
const resultsList = document.getElementById("search-results");
const feedback = document.getElementById("search-feedback");
const selectedAthlete = document.getElementById("selected-athlete");
const configForm = document.getElementById("config-form");
const targetFinishInput = document.getElementById("target_finish_time");

function setSelected(row) {
  document.getElementById("entry_id").value = row.entry_id;
  document.getElementById("profile_id").value = row.profile_id || "";
  document.getElementById("name").value = row.name;
  document.getElementById("bib").value = row.bib || "";
  document.getElementById("division").value = row.division || "";
  selectedAthlete.textContent = `${row.name} (bib ${row.bib || "?"})`;
}

configForm.addEventListener("submit", (event) => {
  event.preventDefault();

  const payload = {
    race_slug: document.getElementById("race_slug").value,
    entry_id: document.getElementById("entry_id").value,
    profile_id: document.getElementById("profile_id").value,
    name: document.getElementById("name").value,
    bib: document.getElementById("bib").value,
    division: document.getElementById("division").value,
    target_finish_time: targetFinishInput.value.trim(),
  };

  if (!payload.name) {
    feedback.textContent = "Select an athlete from search results first.";
    return;
  }

  try {
    window.AthleteStoreClient.addAthlete(payload);
    window.location.assign("/");
  } catch (error) {
    if (error.message === "missing_identity") {
      feedback.textContent = "Provide at least one athlete identity (entry ID or bib).";
      return;
    }
    if (error.message === "duplicate_identity") {
      feedback.textContent = "This athlete is already configured.";
      return;
    }
    if (error.message === "conflicting_identity") {
      feedback.textContent = "Entry ID and bib point to different athletes.";
      return;
    }
    if (error.message === "invalid_target") {
      feedback.textContent = "Target finish must be in HH:MM:SS format.";
      return;
    }
    feedback.textContent = "Could not save athlete configuration.";
  }
});

searchBtn.addEventListener("click", async () => {
  const raceSlug = document.getElementById("race_slug").value;
  const q = document.getElementById("search_term").value.trim();
  if (q.length < 2) {
    feedback.textContent = "Enter at least 2 characters.";
    return;
  }

  feedback.textContent = "Searching...";
  resultsList.innerHTML = "";

  const response = await fetch(`/api/search?race_slug=${encodeURIComponent(raceSlug)}&q=${encodeURIComponent(q)}`);
  const payload = await response.json();
  if (!response.ok) {
    feedback.textContent = payload.error || "Search failed.";
    return;
  }

  const results = payload.results || [];
  if (!results.length) {
    feedback.textContent = "No athletes found.";
    return;
  }

  feedback.textContent = `Found ${results.length} athlete(s). Click one to select.`;
  for (const row of results) {
    const li = document.createElement("li");
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = `${row.name} (bib ${row.bib || "?"}) ${row.division ? "- " + row.division : ""}`;
    button.addEventListener("click", () => setSelected(row));
    li.appendChild(button);
    resultsList.appendChild(li);
  }
});

searchTermInput.addEventListener("keydown", (event) => {
  if (event.key !== "Enter") {
    return;
  }
  event.preventDefault();
  searchBtn.click();
});
</script>
{% endblock %}
